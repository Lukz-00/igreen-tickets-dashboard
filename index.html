<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iGreen — Relatório de Tickets</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  :root {
    --blue: #185FA5; --teal: #0F6E56; --coral: #D85A30; --amber: #BA7517;
    --red: #A32D2D; --green: #1D9E75; --gray: #888780; --lgray: #C8C5BE;
    --dark: #1E1D1B; --bg: #F7F6F2; --card: #FFFFFF; --border: #E2E0D8;
    --lb: #E6F1FB; --lt: #E1F5EE; --lc: #FAECE7; --la: #FAEEDA; --lr: #FCEBEB;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--dark); font-size: 14px; line-height: 1.55; }
  .site-header { background: var(--dark); color: #fff; padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; height: 56px; position: sticky; top: 0; z-index: 100; }
  .site-header .logo { font-size: 15px; font-weight: 600; display: flex; align-items: center; gap: 10px; }
  .logo-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); display: inline-block; }
  .site-header .meta { font-size: 12px; color: #aaa8a2; }
  .hero { background: linear-gradient(135deg, #0D1B2A 0%, #1B3A5C 60%, #0F6E56 100%); color: #fff; padding: 2.4rem 2rem 2rem; }
  .hero-inner { max-width: 1140px; margin: 0 auto; }
  .hero h1 { font-size: clamp(1.5rem, 3.4vw, 2.2rem); font-weight: 700; }
  .hero h1 span { color: #7EC8A8; }
  .hero-sub { font-size: 13px; color: #aecfc4; margin: .4rem 0 1.6rem; }
  .hero-kpis { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; }
  .hero-kpi { background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.12); border-radius: 10px; padding: .9rem 1rem; }
  .hero-kpi-label { font-size: 11px; color: #aecfc4; margin-bottom: 4px; text-transform: uppercase; letter-spacing: .05em; }
  .hero-kpi-val { font-size: 1.7rem; font-weight: 700; }
  .container { max-width: 1140px; margin: 0 auto; padding: 0 2rem; }
  .tabs-wrap { background: var(--card); border-bottom: 2px solid var(--border); position: sticky; top: 56px; z-index: 90; }
  .tabs { max-width: 1140px; margin: 0 auto; padding: 0 2rem; display: flex; gap: 0; overflow-x: auto; }
  .tab { padding: .85rem 1.3rem; font-size: 13px; font-weight: 500; color: var(--gray); cursor: pointer; border-bottom: 3px solid transparent; white-space: nowrap; }
  .tab:hover { color: var(--dark); }
  .tab.active { color: var(--blue); border-bottom-color: var(--blue); font-weight: 600; }
  .section { display: none; padding: 1.8rem 0 3rem; }
  .section.active { display: block; }
  .sec-header { display: flex; align-items: center; gap: 10px; margin-bottom: .3rem; flex-wrap: wrap; }
  .sec-title { font-size: 17px; font-weight: 700; }
  .sec-badge { font-size: 11px; padding: 3px 9px; border-radius: 20px; font-weight: 600; }
  .badge-blue { background: var(--lb); color: var(--blue); }
  .badge-coral { background: var(--lc); color: var(--coral); }
  .sec-desc { font-size: 13px; color: #666; margin: .3rem 0 1.2rem; }
  .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 1.6rem; }
  .ggrid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 1.6rem; }
  .cgrid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 14px; margin-bottom: 1.6rem; }
  .kpi-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 1rem 1.1rem; }
  .kpi-label { font-size: 11.5px; color: #777; margin-bottom: 6px; text-transform: uppercase; letter-spacing: .03em; }
  .kpi-value { font-size: 1.6rem; font-weight: 700; }
  .kpi-sub { font-size: 11.5px; color: #999; margin-top: 2px; }
  .chart-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 1.2rem 1.3rem; margin-bottom: 1.4rem; }
  .chart-card h3 { font-size: 14.5px; margin-bottom: 2px; }
  .chart-card p { font-size: 12.5px; color: #888; margin-bottom: .8rem; }
  .chart-wrap { position: relative; }
  .tbl-wrap { overflow-x: auto; background: var(--card); border: 1px solid var(--border); border-radius: 10px; }
  table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
  th, td { padding: 8px 12px; text-align: left; border-bottom: 1px solid var(--border); }
  th { background: #F1EFE8; font-weight: 600; color: #555; font-size: 11.5px; text-transform: uppercase; }
  .alert { display: flex; gap: 10px; padding: .9rem 1.1rem; border-radius: 10px; font-size: 13px; margin-bottom: 1.2rem; }
  .alert-amber { background: var(--la); color: #7a5510; }
  .picos-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; margin-bottom: 1.2rem; }
  .pico-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: .8rem; display: flex; gap: 10px; align-items: center; }
  .pico-rank { width: 26px; height: 26px; border-radius: 50%; background: var(--lgray); color: #fff; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 12px; flex-shrink: 0; }
  .pico-rank.r1 { background: var(--red); } .pico-rank.r2 { background: var(--coral); } .pico-rank.r3 { background: var(--amber); }
  .pico-val { font-weight: 700; font-size: 1.1rem; }
  .pico-date { font-size: 11px; color: #888; }
  .empty-state, .error-state { text-align: center; padding: 3rem 1rem; color: #999; }
  .cc { cursor: pointer; color: var(--blue); font-weight: 700; text-decoration: underline; text-underline-offset: 2px; }
  #modalOverlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.55); z-index: 200; align-items: center; justify-content: center; padding: 20px; }
  #modalOverlay.open { display: flex; }
  #modalBox { background: var(--card); border-radius: 14px; width: 100%; max-width: 920px; max-height: 88vh; display: flex; flex-direction: column; box-shadow: 0 24px 64px rgba(0,0,0,.3); }
  .modal-hdr { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
  .modal-title { font-size: 14px; font-weight: 700; }
  .modal-close { background: none; border: none; cursor: pointer; color: var(--gray); font-size: 22px; line-height: 1; padding: 2px 6px; border-radius: 6px; }
  .modal-close:hover { background: var(--bg); }
  .modal-srch { padding: 10px 20px; border-bottom: 1px solid var(--border); }
  .modal-srch input { width: 100%; padding: 7px 10px; border: 1px solid var(--border); border-radius: 7px; font-size: 12px; outline: none; }
  .modal-body { flex: 1; overflow-y: auto; }
  .modal-ftr { padding: 10px 20px; border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; font-size: 12px; color: var(--gray); }
  .btn { display: inline-flex; align-items: center; gap: 5px; padding: 6px 13px; border-radius: 7px; font-size: 12px; font-weight: 600; cursor: pointer; border: none; }
  .btn-primary { background: var(--blue); color: #fff; }
  .error-state { color: var(--red); }
  footer { text-align: center; font-size: 11.5px; color: #999; padding: 1.5rem 0 2rem; }
  .loading-wrap { text-align: center; padding: 4rem 1rem; color: #888; }
  .spinner { width: 34px; height: 34px; border: 3px solid var(--border); border-top-color: var(--blue); border-radius: 50%; margin: 0 auto 1rem; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<header class="site-header">
  <div class="logo"><span class="logo-dot"></span> iGreen Energy · Tickets</div>
  <div class="meta" id="updatedAtLabel"></div>
</header>

<div class="hero">
  <div class="hero-inner">
    <h1>Performance de <span>Fornecedoras</span></h1>
    <p class="hero-sub">Relatório de tickets — atualizado automaticamente a partir da base do time.</p>
    <div class="hero-kpis" id="heroKpis"></div>
  </div>
</div>

<div id="root">
  <div class="loading-wrap"><div class="spinner"></div>Carregando dados…</div>
</div>

<footer id="footerNote"></footer>

<script>
/* ======================================================
   Ajuste só esta linha com a URL do seu Web App do Apps Script
   (terminada em /exec), publicado com acesso "Qualquer pessoa".
   ====================================================== */
const API_URL = 'https://script.google.com/macros/s/AKfycbwIklYujbRvBanriVOpK6TvV6CNTSQ3-ff5w17_1MgeiWohlDiaoPuE48Mpk1Hdeit5/exec';

const BLUE='#185FA5', TEAL='#0F6E56', CORAL='#D85A30', AMBER='#BA7517',
      RED='#A32D2D', GREEN='#1D9E75', GRAY='#888780', LGRAY='#C8C5BE';
const gridC = 'rgba(0,0,0,0.06)';

function fmt(n){ return Number(n||0).toLocaleString('pt-BR'); }
function fmtPct(n){ return Number(n||0).toLocaleString('pt-BR', {maximumFractionDigits:1}) + '%'; }

/* ---------- MODAL (listas clicáveis de tickets) ---------- */
let _modalTix = [];
function openModal(title, tix, badges){
  _modalTix = tix || [];
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalBadges').innerHTML = (badges||[]).map(([cls,txt]) =>
    `<span class="sec-badge badge-${cls}">${txt}</span>`).join(' ');
  document.getElementById('modalSearch').value = '';
  renderModalTable(_modalTix);
  document.getElementById('modalOverlay').classList.add('open');
}
function renderModalTable(tix){
  document.getElementById('modalCount').textContent = fmt(tix.length) + (tix.length===1?' ticket exibido':' tickets exibidos');
  const body = document.getElementById('modalBody');
  if (!tix.length){ body.innerHTML = '<div style="text-align:center;color:#999;padding:40px">Nenhum ticket encontrado.</div>'; return; }
  body.innerHTML = `<table>
    <thead><tr><th>#</th><th>Código</th><th>Tipo</th><th>Status</th><th>Fornecedora</th><th>Distribuidora</th><th>Criado</th><th>Dias</th><th>SLA</th></tr></thead>
    <tbody>${tix.slice(0,500).map((t,i) => `<tr>
      <td>${i+1}</td><td style="font-weight:600">${t.codigo}</td>
      <td style="max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${t.tipo}">${t.tipo}</td>
      <td>${t.status}</td><td>${t.fornecedora||'—'}</td><td>${t.distribuidora||'—'}</td>
      <td style="white-space:nowrap">${t.criadoEm||'—'}</td>
      <td>${t.elapsed!=null?t.elapsed.toFixed(1):'—'}</td>
      <td style="color:${t.foraSla?'#A32D2D':'#1D9E75'}">${t.foraSla?'Fora do SLA':'No prazo'}</td>
    </tr>`).join('')}
    ${tix.length>500 ? `<tr><td colspan="9" style="text-align:center;color:#999;padding:10px">+${fmt(tix.length-500)} adicionais — use o CSV</td></tr>` : ''}
    </tbody></table>`;
}
function wireModalHandlers(){
  document.getElementById('modalSearch').addEventListener('input', e => {
    const q = e.target.value.toLowerCase();
    renderModalTable(q ? _modalTix.filter(t => [t.codigo,t.tipo,t.status,t.fornecedora,t.distribuidora,t.cliente].some(x => (x||'').toString().toLowerCase().includes(q))) : _modalTix);
  });
  document.getElementById('modalCloseBtn').addEventListener('click', () => document.getElementById('modalOverlay').classList.remove('open'));
  document.getElementById('modalOverlay').addEventListener('click', e => { if (e.target === e.currentTarget) e.currentTarget.classList.remove('open'); });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') { const ov = document.getElementById('modalOverlay'); if (ov) ov.classList.remove('open'); } });
  document.getElementById('modalExportBtn').addEventListener('click', () => {
    const q = document.getElementById('modalSearch').value.toLowerCase();
    const data = q ? _modalTix.filter(t => [t.codigo,t.tipo,t.status,t.fornecedora,t.distribuidora,t.cliente].some(x => (x||'').toString().toLowerCase().includes(q))) : _modalTix;
    const header = 'Código,Tipo,Status,Fornecedora,Distribuidora,Cliente,Criado,Dias,SLA\n';
    const rows = data.map(t => [t.codigo,t.tipo,t.status,t.fornecedora,t.distribuidora,t.cliente,t.criadoEm,t.elapsed,t.foraSla?'Fora do SLA':'No prazo']
      .map(x => `"${x==null?'':x}"`).join(',')).join('\n');
    const blob = new Blob(['\uFEFF' + header + rows], { type: 'text/csv;charset=utf-8' });
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'tickets-igreen.csv'; a.click();
  });
}

let DATA = null;

async function loadData(){
  try {
    const res = await fetch(API_URL + (API_URL.includes('?') ? '&' : '?') + 'format=json');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    DATA = await res.json();
    boot();
  } catch (err) {
    document.getElementById('root').innerHTML =
      '<div class="container"><div class="error-state">Não consegui carregar os dados.<br>' +
      'Confira se a URL do Apps Script em <code>API_URL</code> está correta e se o Web App está publicado com acesso "Qualquer pessoa".<br>' +
      '<small>' + err.message + '</small></div></div>';
  }
}

function boot(){
  document.getElementById('root').innerHTML = `
    <div class="tabs-wrap"><div class="tabs" id="tabsBar"></div></div>
    <div class="container" id="sectionsContainer"></div>
  `;

  document.getElementById('root').insertAdjacentHTML('beforeend', `
    <div id="modalOverlay">
      <div id="modalBox">
        <div class="modal-hdr">
          <div>
            <div class="modal-title" id="modalTitle"></div>
            <div style="margin-top:5px;display:flex;gap:6px;flex-wrap:wrap" id="modalBadges"></div>
          </div>
          <button class="modal-close" id="modalCloseBtn">&times;</button>
        </div>
        <div class="modal-srch"><input type="text" id="modalSearch" placeholder="Buscar por código, tipo, status, distribuidora, cliente…"></div>
        <div class="modal-body" id="modalBody"></div>
        <div class="modal-ftr">
          <span id="modalCount"></span>
          <button class="btn btn-primary" id="modalExportBtn">⬇ Exportar CSV</button>
        </div>
      </div>
    </div>
  `);
  wireModalHandlers();
  renderHero();
  buildShell();
  sections[0].render();
  rendered[sections[0].id] = true;
}

/* ---------- HERO KPIs ---------- */
function renderHero(){
  const totalAbertos = DATA.months.reduce((s,m)=>s+m.abertos,0);
  const totalFinalizados = DATA.months.reduce((s,m)=>s+m.finalizados,0);
  const el = document.getElementById('heroKpis');
  el.innerHTML = [
    ['Total de tickets', fmt(DATA.totalTickets), ''],
    ['Abertos no período', fmt(totalAbertos), ''],
    ['Finalizados no período', fmt(totalFinalizados), ''],
    ['Fornecedoras', fmt(DATA.fornecedoras.length), DATA.fornecedoras.join(', ')]
  ].map(([label,val,sub]) => `
    <div class="hero-kpi">
      <div class="hero-kpi-label">${label}</div>
      <div class="hero-kpi-val">${val}</div>
      ${sub ? `<div style="font-size:11px;color:#88b5a2;margin-top:2px">${sub}</div>` : ''}
    </div>`).join('');

  document.getElementById('updatedAtLabel').textContent =
    'Base: ' + fmt(DATA.totalTickets) + ' tickets · atualizado ' + new Date(DATA.updatedAt).toLocaleString('pt-BR');
  document.getElementById('footerNote').textContent =
    'iGreen Energy — BKO · Dashboard público via GitHub Pages · ' + fmt(DATA.totalTickets) + ' tickets na base';
}

/* ---------- TABS / SECTIONS ---------- */
let sections = [];
const rendered = {};

function buildShell(){
  sections = [];
  sections.push({ id: 'geral', label: 'Visão Geral', render: renderGeral });
  if (DATA.fornecedoras.length > 0) sections.push({ id: 'fornecedoras', label: 'Fornecedoras', render: renderFornecedoras });
  if (DATA.distribuidoras && DATA.distribuidoras.length > 0) sections.push({ id: 'distribuidoras', label: 'Distribuidoras', render: renderDistribuidoras });
  DATA.months.forEach(m => sections.push({ id: 'm-' + m.key, label: m.label, render: () => renderMes(m) }));
  sections.push({ id: 'sla', label: 'SLA & Tempos', render: renderSla });
  sections.push({ id: 'picos', label: 'Picos & Semanas', render: renderPicos });
  sections.push({ id: 'reab', label: 'Reaberturas', render: renderReab });

  document.getElementById('tabsBar').innerHTML = sections.map((s,i) =>
    `<div class="tab${i===0?' active':''}" data-id="${s.id}">${s.label}</div>`).join('');
  document.getElementById('sectionsContainer').innerHTML = sections.map((s,i) =>
    `<div class="section${i===0?' active':''}" id="tab-${s.id}"></div>`).join('');

  document.querySelectorAll('.tab').forEach(tabEl => {
    tabEl.addEventListener('click', () => showTab(tabEl.dataset.id));
  });
}

function showTab(id){
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + id).classList.add('active');
  document.querySelector('.tab[data-id="' + id + '"]').classList.add('active');
  if (!rendered[id]) {
    const s = sections.find(s => s.id === id);
    s.render();
    rendered[id] = true;
  }
}

/* ---------- VISÃO GERAL ---------- */
function renderGeral(){
  const el = document.getElementById('tab-geral');
  if (DATA.months.length === 0) {
    el.innerHTML = '<div class="empty-state">Ainda não há dados na base.</div>';
    return;
  }
  const tg = DATA.temposGlobais || {};
  el.innerHTML = `
    <div class="sec-header"><span class="sec-title">Tempos médios do período</span></div>
    <p class="sec-desc">Médias sobre todos os tickets da base.</p>
    <div class="ggrid" id="gaugesRow"></div>

    <div class="sec-header"><span class="sec-title">Volume mensal</span><span class="sec-badge badge-blue">${DATA.months[0].label} – ${DATA.months[DATA.months.length-1].label}</span></div>
    <p class="sec-desc">Tickets abertos, finalizados e com resposta da fornecedora, por mês.</p>
    <div class="chart-card"><div class="chart-wrap" style="height:280px"><canvas id="chartMensal"></canvas></div></div>

    <div class="sec-header"><span class="sec-title">Resumo mensal</span></div>
    <p class="sec-desc">Pendentes s/ resp. = tickets ainda em aberto que nunca receberam resposta da fornecedora. Fora do SLA = desses pendentes, quantos ultrapassam 10 dias úteis (considerando feriados nacionais).</p>
    <div class="tbl-wrap" style="margin-bottom:1.6rem"><table>
      <thead><tr><th>Mês</th><th>Abertos</th><th>Finalizados</th><th>Taxa fin.</th><th>Resp. fornecedora</th><th>Pendentes s/ resp.</th><th>Fora SLA (&gt;10 du)</th><th>T.méd. Rel.</th><th>T.méd. Forn.</th><th>T.méd. 1ª resp.</th></tr></thead>
      <tbody>${DATA.months.map(m => `<tr>
        <td>${m.label}</td><td>${fmt(m.abertos)}</td><td>${fmt(m.finalizados)}</td>
        <td style="color:${m.taxaFin>=80?'#1D9E75':m.taxaFin>=50?'#BA7517':'#A32D2D'}">${fmtPct(m.taxaFin)}</td>
        <td>${fmt(m.respThopen)}</td><td class="cc" data-mes-pend="${m.key}">${fmt(m.pendSemResp)}</td>
        <td class="cc" style="color:${m.foraSla>0?'#A32D2D':'#1D9E75'}" data-mes-fora="${m.key}">${m.foraSla>0?fmt(m.foraSla):'✓ todos no prazo'}</td>
        <td>${m.tmedRelDias!==null ? m.tmedRelDias.toFixed(1)+'d' : '—'}</td>
        <td>${m.tmedFornDias!==null ? m.tmedFornDias.toFixed(1)+'d' : '—'}</td>
        <td>${m.tmedRespDias!==null ? m.tmedRespDias.toFixed(1)+'d' : '—'}</td>
      </tr>`).join('')}</tbody>
    </table></div>

    <div class="sec-header"><span class="sec-title">Tipos mais abertos — tendência e comparativo mensal</span></div>
    <p class="sec-desc">${DATA.tipoQuinzenal ? `Últimas 2 semanas: <strong>${DATA.tipoQuinzenal.rangeAtual}</strong> · 2 semanas anteriores: <strong>${DATA.tipoQuinzenal.rangeAnterior}</strong> · 🔴 = volume aumentou ≥50% nas últimas 2 semanas (gargalo em crescimento)` : ''}</p>
    <div class="cgrid">
      <div class="chart-card"><h3>Top tipos — últimas 2 semanas</h3><p>Comparado às 2 semanas anteriores. Clique numa barra para ver os tickets.</p>
        <div class="chart-wrap" style="height:260px"><canvas id="chartTipo2w"></canvas></div>
      </div>
      <div class="chart-card"><h3>Evolução mensal — top 6 tipos</h3><p>Tendência mês a mês.</p>
        <div class="chart-wrap" style="height:260px"><canvas id="chartTipoEvol"></canvas></div>
      </div>
    </div>

    <div class="sec-header"><span class="sec-title">Visão geral do período</span></div>
    <div class="cgrid">
      <div class="chart-card"><h3>Volume de Tickets por Mês</h3>
        <div class="chart-wrap" style="height:220px"><canvas id="chartOvVol"></canvas></div>
      </div>
      <div class="chart-card"><h3>Taxa de Finalização por Mês (%)</h3>
        <div class="chart-wrap" style="height:220px"><canvas id="chartOvFin"></canvas></div>
      </div>
      <div class="chart-card"><h3>Top Tipos de Ticket — período completo</h3>
        <div class="chart-wrap" style="height:220px"><canvas id="chartOvTipo"></canvas></div>
      </div>
    </div>

    <div class="sec-header"><span class="sec-title">Top 15 tipos de ticket</span></div>
    <div class="tbl-wrap"><table>
      <thead><tr><th>Tipo</th><th>Quantidade</th><th>% do total</th></tr></thead>
      <tbody>${DATA.topTipos.map(t => `<tr><td>${t.tipo}</td><td>${fmt(t.qtd)}</td><td>${fmtPct(t.qtd/DATA.totalTickets*100)}</td></tr>`).join('')}</tbody>
    </table></div>
  `;
  document.getElementById('gaugesRow').innerHTML = [
    ['T.méd. Relacionamento', tg.rel],
    ['T.méd. Fornecedora', tg.forn],

/* ---------- GAUGE (semicírculo SVG) ---------- */
function gaugeSvg(val, label){
  if (val === null || val === undefined) {
    return `<div class="chart-card" style="text-align:center;padding:.9rem"><div class="kpi-label">${label}</div><div style="padding:1.2rem 0;color:${GRAY}">sem dados</div></div>`;
  }
  const maxScale = 30;
  const p = Math.min(val / maxScale, 1);
  const color = val <= 7 ? GREEN : val <= 15 ? AMBER : RED;
  const angle = Math.PI - p * Math.PI;
  const ex = (70 + 60 * Math.cos(angle)).toFixed(1);
  const ey = (70 - 60 * Math.sin(angle)).toFixed(1);
  const largeArc = p > 0.5 ? 1 : 0;
  return `<div class="chart-card" style="text-align:center;padding:.9rem">
    <div class="kpi-label">${label}</div>
    <svg width="140" height="80" viewBox="0 0 140 80">
      <path d="M10,70 A60,60 0 0,1 130,70" fill="none" stroke="${LGRAY}" stroke-width="12" stroke-linecap="round"/>
      <path d="M10,70 A60,60 0 ${largeArc},1 ${ex},${ey}" fill="none" stroke="${color}" stroke-width="12" stroke-linecap="round"/>
    </svg>
    <div style="font-size:1.3rem;font-weight:700;color:${color}">${val.toFixed(1)}d</div>
  </div>`;
}

      <div class="kpi-card" style="border-left:4px solid ${RED}"><div class="kpi-label">Mesmo tipo repetido</div><div class="kpi-value">${fmt(r.mesmoTipoRepetido)}</div><div class="kpi-sub">pares cliente+tipo com 2+ tickets</div></div>
      <div class="kpi-card"><div class="kpi-label">Tickets em repetição</div><div class="kpi-value">${fmt(r.ticketsRepeticao)}</div><div class="kpi-sub">mesmo problema, abertura nova</div></div>
      <div class="kpi-card" style="border-left:4px solid ${RED}"><div class="kpi-label">Clientes com 5+ tickets</div><div class="kpi-value">${fmt(r.clientes5mais)}</div><div class="kpi-sub">alta recorrência</div></div>
      <div class="kpi-card" style="border-left:4px solid ${RED}"><div class="kpi-label">Clientes com 8+ tickets</div><div class="kpi-value">${fmt(r.clientes8mais)}</div><div class="kpi-sub">casos críticos</div></div>
    </div>

    <div class="sec-header"><span class="sec-title">Pares cliente + tipo repetidos</span></div>
    <p class="sec-desc">Clique em "ver" para abrir a lista de tickets daquele cliente com aquele tipo.</p>
    <div style="display:flex; gap:10px; margin-bottom:1rem; flex-wrap:wrap; align-items:center">
      <input type="text" id="reabSearch" placeholder="Buscar por cliente ou tipo…" style="flex:1; min-width:200px; padding:.5rem .7rem; border:1px solid var(--border); border-radius:8px; font-size:13px">
      <select id="reabMinQtd" style="padding:.5rem .7rem; border:1px solid var(--border); border-radius:8px; font-size:13px">
        <option value="2">2+ tickets</option>
        <option value="3">3+ tickets</option>
        <option value="5">5+ tickets</option>
        <option value="8">8+ tickets</option>
      </select>
    </div>
    <div class="tbl-wrap"><table>
      <thead><tr><th>Cliente</th><th>Tipo</th><th>Qtd</th><th>Abertos</th><th>Finalizados</th><th></th></tr></thead>
      <tbody id="reabParesBody"></tbody>
    </table></div>
  `;
  document.getElementById('reabSearch').addEventListener('input', e => { _reabSearch = e.target.value.toLowerCase(); renderReabParesTable_(); });
  document.getElementById('reabMinQtd').addEventListener('change', e => { _reabMinQtd = parseInt(e.target.value); renderReabParesTable_(); });
  renderReabParesTable_();
}

function renderReabParesTable_(){
  const body = document.getElementById('reabParesBody');
  if (!body) return;
  const pares = (DATA.reaberturasPares || [])
    .filter(p => p.qtd >= _reabMinQtd)
    .filter(p => !_reabSearch || p.cliente.toLowerCase().includes(_reabSearch) || p.tipo.toLowerCase().includes(_reabSearch))
    .slice(0, 300);
  if (!pares.length){ body.innerHTML = '<tr><td colspan="6" style="text-align:center;color:#999;padding:1rem">Nenhum par encontrado.</td></tr>'; return; }
  body.innerHTML = pares.map((p,i) => `<tr>
    <td>${p.cliente}</td><td>${p.tipo}</td><td><strong>${fmt(p.qtd)}</strong></td>
    <td>${fmt(p.abertos)}</td><td>${fmt(p.finalizados)}</td>
    <td><button class="btn btn-primary" style="padding:3px 10px;font-size:11px" data-reab-i="${i}">🔍 ver</button></td>
  </tr>`).join('');
  body.querySelectorAll('[data-reab-i]').forEach(btn => {
    btn.addEventListener('click', () => {
      const p = pares[parseInt(btn.dataset.reabI)];
      const tix = DATA.allTickets.filter(t => t.cliente === p.cliente && t.tipo === p.tipo);
      openModal('Cliente ' + p.cliente + ' — ' + p.tipo, tix, [['coral', fmt(p.qtd) + ' tickets']]);
    });
  });
}

loadData();
</script>
</body>
</html>
