<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iGreen — Relatório de Tickets</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  /* Fonte do iGreen DS (self-hosted em fonts/ deste mesmo repo). Cai pra
     system-ui se não carregar. */
  @font-face {
    font-family: 'Geist';
    src: url('fonts/Geist-Variable.woff2') format('woff2');
    font-weight: 100 900;
    font-display: swap;
  }
  :root {
    /* ===== iGreen Design System — tokens convertidos de OKLCH pra hex =====
       Fonte: @snksergio/design-system (my-app/src/styles/theme/tailwind-theme.css).
       Este dashboard é HTML/JS puro (sem Tailwind/build step), então os tokens
       foram convertidos uma vez pra hex — os NOMES das variáveis (--blue,
       --coral...) continuam os mesmos de propósito, só os VALORES agora vêm
       do DS, pra não precisar tocar em cada uso no arquivo. */
    --font-sans: 'Geist', 'Segoe UI', system-ui, sans-serif;
    --radius-xs: 4px; --radius-sm: 6px; --radius-md: 8px; --radius-lg: 10px; --radius-xl: 14px; --radius-full: 9999px;
    --shadow-sm: 0 1px 2px rgba(0,0,0,.04);
    --shadow-md: rgba(145,158,171,.18) 0 0 2px 0, rgba(145,158,171,.12) 0 12px 24px -4px;

    --blue: #00803C;  /* brand */         --teal: #00A8A9;   /* chart-2 */
    --coral: #F27635; /* warning+danger */ --amber: #F5B423; /* warning */
    --red: #EF4444;   /* danger */         --green: #29AB77; /* success */
    --gray: #636363;  /* fg-muted */       --lgray: #9F9F9F; /* fg-subtle */
    --dark: #0B0B0B;  /* fg-strong */      --bg: #F6F6F6;    /* bg-subtle */
    --card: #FFFFFF;  /* bg-canvas */      --border: #E0E0E0; /* border-default */
    --lb: #DBEDE4; --lt: #DBF3F3; --lc: #FDECE3; --la: #FEF4E0; --lr: #FDE5E5;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font-sans); background: var(--bg); color: var(--dark); font-size: 14px; line-height: 1.55; }
  .site-header { background: var(--dark); color: #fff; padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; height: 56px; position: sticky; top: 0; z-index: 100; }
  .site-header .logo { font-size: 15px; font-weight: 600; display: flex; align-items: center; gap: 10px; }
  .logo-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); display: inline-block; }
  .site-header .meta { font-size: 12px; color: #aaa8a2; }
  .hero { background: linear-gradient(135deg, #0B0B0B 0%, #163D26 55%, #00803C 100%); color: #fff; padding: 2.4rem 2rem 2rem; }
  .hero-inner { max-width: 1140px; margin: 0 auto; }
  .hero h1 { font-size: clamp(1.5rem, 3.4vw, 2.2rem); font-weight: 700; }
  .hero h1 span { color: #6FDBA0; }
  .hero-sub { font-size: 13px; color: #A9D9BE; margin: .4rem 0 1.6rem; }
  .hero-kpis { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; }
  .hero-kpi { background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.12); border-radius: var(--radius-lg); padding: .9rem 1rem; }
  .hero-kpi-label { font-size: 11px; color: #A9D9BE; margin-bottom: 4px; text-transform: uppercase; letter-spacing: .05em; }
  .hero-kpi-val { font-size: 1.7rem; font-weight: 700; }
  .container { max-width: 1140px; margin: 0 auto; padding: 0 2rem; }
  .tabs-wrap { background: var(--card); border-bottom: 2px solid var(--border); position: sticky; top: 56px; z-index: 90; }
  .tabs { max-width: 1140px; margin: 0 auto; padding: 0 2rem; display: flex; gap: 0; overflow-x: auto; }
  .tab { padding: .85rem 1.3rem; font-size: 13px; font-weight: 500; color: var(--gray); cursor: pointer; border-bottom: 3px solid transparent; white-space: nowrap; }
  .tab:hover { color: var(--dark); }
  .tab.active { color: var(--blue); border-bottom-color: var(--blue); font-weight: 600; }
  .section { display: none; padding: 1.8rem 0 3rem; }
  .section.active { display: block; }
  .sec-header { display: flex; align-items: center; gap: 10px; margin-bottom: .3rem; flex-wrap: wrap; }
  .sec-title { font-size: 17px; font-weight: 700; }
  .sec-badge { font-size: 11px; padding: 3px 9px; border-radius: var(--radius-full); font-weight: 600; }
  .badge-blue { background: var(--lb); color: var(--blue); }
  .badge-coral { background: var(--lc); color: var(--coral); }
  .sec-desc { font-size: 13px; color: #666; margin: .3rem 0 1.2rem; }
  .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 1.6rem; }
  .ggrid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 1.6rem; }
  .cgrid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 14px; margin-bottom: 1.6rem; }
  .wk-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); gap: 10px; margin-bottom: 1.4rem; }
  .wk-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-lg); box-shadow: var(--shadow-sm); padding: .8rem; text-align: center; }
  .wk-card.peak { border-color: var(--coral); background: var(--lc); }
  .wk-label { font-size: 11px; color: #888; margin-bottom: 4px; }
  .wk-star { color: var(--coral); margin-left: 3px; }
  .wk-val { font-size: 1.3rem; font-weight: 700; }
  .wk-range { font-size: 10.5px; color: #999; margin-top: 2px; }
  tr.tr-peak td { background: var(--la) !important; }
  .mbar-cell { display: flex; align-items: center; gap: 6px; white-space: nowrap; }
  .mbar-track { width: 60px; height: 8px; background: #EFEDE6; border-radius: var(--radius-xs); overflow: hidden; flex-shrink: 0; }
  .mbar-fill { height: 100%; border-radius: var(--radius-xs); }
  .mbar-val { font-size: 11.5px; font-weight: 600; min-width: 22px; }
  .tipo-link { color: var(--blue); font-weight: 700; cursor: pointer; text-decoration: underline; text-underline-offset: 2px; }
  #modalOverlay2 { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.55); z-index: 210; align-items: center; justify-content: center; padding: 20px; }
  #modalOverlay2.open { display: flex; }
  #modalBox2 { background: var(--card); border-radius: var(--radius-xl); width: 100%; max-width: 1080px; max-height: 90vh; display: flex; flex-direction: column; box-shadow: 0 24px 64px rgba(0,0,0,.3); }
  #modalBody2 { flex: 1; overflow-y: auto; padding: 16px 20px; }
  .kpi-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-lg); box-shadow: var(--shadow-sm); padding: 1.5rem; }
  .kpi-label { font-size: 11.5px; color: #777; margin-bottom: 6px; text-transform: uppercase; letter-spacing: .03em; }
  .kpi-value { font-size: 1.6rem; font-weight: 700; }
  .kpi-sub { font-size: 11.5px; color: #999; margin-top: 2px; }
  .chart-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-lg); box-shadow: var(--shadow-sm); padding: 1.5rem; margin-bottom: 1.4rem; }
  .chart-card h3 { font-size: 14.5px; margin-bottom: 2px; }
  .chart-card p { font-size: 12.5px; color: #888; margin-bottom: .8rem; }
  .chart-wrap { position: relative; }
  .tbl-wrap { overflow-x: auto; background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-lg); box-shadow: var(--shadow-sm); }
  table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
  th, td { padding: 8px 12px; text-align: left; border-bottom: 1px solid var(--border); }
  th { background: #F1EFE8; font-weight: 600; color: #555; font-size: 11.5px; text-transform: uppercase; }
  .alert { display: flex; gap: 10px; padding: .9rem 1.1rem; border-radius: var(--radius-lg); font-size: 13px; margin-bottom: 1.2rem; }
  .alert-amber { background: var(--la); color: #7a5510; }
  .picos-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; margin-bottom: 1.2rem; }
  .pico-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-lg); box-shadow: var(--shadow-sm); padding: .8rem; display: flex; gap: 10px; align-items: center; }
  .pico-rank { width: 26px; height: 26px; border-radius: 50%; background: var(--lgray); color: #fff; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 12px; flex-shrink: 0; }
  .pico-rank.r1 { background: var(--red); } .pico-rank.r2 { background: var(--coral); } .pico-rank.r3 { background: var(--amber); }
  .pico-val { font-weight: 700; font-size: 1.1rem; }
  .pico-date { font-size: 11px; color: #888; }
  .empty-state, .error-state { text-align: center; padding: 3rem 1rem; color: #999; }
  .cc { cursor: pointer; color: var(--blue); font-weight: 700; text-decoration: underline; text-underline-offset: 2px; }
  #modalOverlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.55); z-index: 200; align-items: center; justify-content: center; padding: 20px; }
  #modalOverlay.open { display: flex; }
  #modalBox { background: var(--card); border-radius: var(--radius-xl); width: 100%; max-width: 920px; max-height: 88vh; display: flex; flex-direction: column; box-shadow: 0 24px 64px rgba(0,0,0,.3); }
  .modal-hdr { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
  .modal-title { font-size: 14px; font-weight: 700; }
  .modal-close { background: none; border: none; cursor: pointer; color: var(--gray); font-size: 22px; line-height: 1; padding: 2px 6px; border-radius: var(--radius-sm); }
  .modal-close:hover { background: var(--bg); }
  .modal-srch { padding: 10px 20px; border-bottom: 1px solid var(--border); }
  .modal-srch input { width: 100%; padding: 7px 10px; border: 1px solid var(--border); border-radius: var(--radius-md); font-size: 12px; outline: none; }
  .modal-body { flex: 1; overflow-y: auto; }
  .modal-ftr { padding: 10px 20px; border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; font-size: 12px; color: var(--gray); }
  .btn { display: inline-flex; align-items: center; gap: 5px; padding: 6px 13px; border-radius: var(--radius-md); font-size: 12px; font-weight: 600; cursor: pointer; border: none; }
  .btn-primary { background: var(--blue); color: #fff; }
  .error-state { color: var(--red); }
  footer { text-align: center; font-size: 11.5px; color: #999; padding: 1.5rem 0 2rem; }
  .loading-wrap { text-align: center; padding: 4rem 1rem; color: #888; }
  .spinner { width: 34px; height: 34px; border: 3px solid var(--border); border-top-color: var(--blue); border-radius: 50%; margin: 0 auto 1rem; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<header class="site-header">
  <div class="logo"><span class="logo-dot"></span> iGreen Energy · Tickets</div>
  <div class="meta" id="updatedAtLabel"></div>
</header>

<div class="hero">
  <div class="hero-inner">
    <h1>Performance de <span>Fornecedoras</span></h1>
    <p class="hero-sub">Relatório de tickets — atualizado automaticamente a partir da base do time.</p>
    <div class="hero-kpis" id="heroKpis"></div>
  </div>
</div>

<div id="root">
  <div class="loading-wrap"><div class="spinner"></div>Carregando dados…</div>
</div>

<footer id="footerNote"></footer>

<script>
/* ======================================================
   Ajuste só esta linha com a URL do seu Web App do Apps Script
   (terminada em /exec), publicado com acesso "Qualquer pessoa".
   ====================================================== */
const API_URL = 'https://script.google.com/macros/s/AKfycbwIklYujbRvBanriVOpK6TvV6CNTSQ3-ff5w17_1MgeiWohlDiaoPuE48Mpk1Hdeit5/exec';

// Mesmos valores hex do :root (tokens do iGreen DS) — repetidos aqui porque
// Chart.js/Canvas2D não lê custom properties CSS diretamente.
const BLUE='#00803C', TEAL='#00A8A9', CORAL='#F27635', AMBER='#F5B423',
      RED='#EF4444', GREEN='#29AB77', GRAY='#636363', LGRAY='#9F9F9F';
const gridC = 'rgba(0,0,0,0.06)';

function fmt(n){ return Number(n||0).toLocaleString('pt-BR'); }
function fmtPct(n){ return Number(n||0).toLocaleString('pt-BR', {maximumFractionDigits:1}) + '%'; }

/* ---------- MODAL (listas clicáveis de tickets) ---------- */
let _modalTix = [];
function openModal(title, tix, badges){
  _modalTix = tix || [];
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalBadges').innerHTML = (badges||[]).map(([cls,txt]) =>
    `<span class="sec-badge badge-${cls}">${txt}</span>`).join(' ');
  document.getElementById('modalSearch').value = '';
  renderModalTable(_modalTix);
  document.getElementById('modalOverlay').classList.add('open');
}
function renderModalTable(tix){
  document.getElementById('modalCount').textContent = fmt(tix.length) + (tix.length===1?' ticket exibido':' tickets exibidos');
  const body = document.getElementById('modalBody');
  if (!tix.length){ body.innerHTML = '<div style="text-align:center;color:#999;padding:40px">Nenhum ticket encontrado.</div>'; return; }
  body.innerHTML = `<table>
    <thead><tr><th>#</th><th>Código</th><th>Tipo</th><th>Status</th><th>Fornecedora</th><th>Distribuidora</th><th>Criado</th><th>Dias</th><th>SLA</th></tr></thead>
    <tbody>${tix.slice(0,500).map((t,i) => `<tr>
      <td>${i+1}</td><td style="font-weight:600">${t.codigo}</td>
      <td style="max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${t.tipo}">${t.tipo}</td>
      <td>${t.status}</td><td>${t.fornecedora||'—'}</td><td>${t.distribuidora||'—'}</td>
      <td style="white-space:nowrap">${t.criadoEm||'—'}</td>
      <td>${t.elapsed!=null?t.elapsed.toFixed(1):'—'}</td>
      <td style="color:${t.foraSla?RED:GREEN}">${t.foraSla?'Fora do SLA':'No prazo'}</td>
    </tr>`).join('')}
    ${tix.length>500 ? `<tr><td colspan="9" style="text-align:center;color:#999;padding:10px">+${fmt(tix.length-500)} adicionais — use o CSV</td></tr>` : ''}
    </tbody></table>`;
}
function wireModalHandlers(){
  document.getElementById('modalSearch').addEventListener('input', e => {
    const q = e.target.value.toLowerCase();
    renderModalTable(q ? _modalTix.filter(t => [t.codigo,t.tipo,t.status,t.fornecedora,t.distribuidora,t.cliente].some(x => (x||'').toString().toLowerCase().includes(q))) : _modalTix);
  });
  document.getElementById('modalCloseBtn').addEventListener('click', () => document.getElementById('modalOverlay').classList.remove('open'));
  document.getElementById('modalOverlay').addEventListener('click', e => { if (e.target === e.currentTarget) e.currentTarget.classList.remove('open'); });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') { const ov = document.getElementById('modalOverlay'); if (ov) ov.classList.remove('open'); } });
  document.getElementById('modalExportBtn').addEventListener('click', () => {
    const q = document.getElementById('modalSearch').value.toLowerCase();
    const data = q ? _modalTix.filter(t => [t.codigo,t.tipo,t.status,t.fornecedora,t.distribuidora,t.cliente].some(x => (x||'').toString().toLowerCase().includes(q))) : _modalTix;
    const header = 'Código,Tipo,Status,Fornecedora,Distribuidora,Cliente,Criado,Dias,SLA\n';
    const rows = data.map(t => [t.codigo,t.tipo,t.status,t.fornecedora,t.distribuidora,t.cliente,t.criadoEm,t.elapsed,t.foraSla?'Fora do SLA':'No prazo']
      .map(x => `"${x==null?'':x}"`).join(',')).join('\n');
    const blob = new Blob(['\uFEFF' + header + rows], { type: 'text/csv;charset=utf-8' });
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'tickets-igreen.csv'; a.click();
  });
  document.getElementById('modalCloseBtn2').addEventListener('click', () => document.getElementById('modalOverlay2').classList.remove('open'));
  document.getElementById('modalOverlay2').addEventListener('click', e => { if (e.target === e.currentTarget) e.currentTarget.classList.remove('open'); });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') { const ov2 = document.getElementById('modalOverlay2'); if (ov2) ov2.classList.remove('open'); } });
}

/* ---------- MODAL 2 (drill-down tipo → distribuidora) ---------- */
const CHARTS_MODAL2 = {};
function destroyChart2_(id){ if (CHARTS_MODAL2[id]) { CHARTS_MODAL2[id].destroy(); delete CHARTS_MODAL2[id]; } }
function miniBar_(val, max, color){
  const pct = max > 0 ? Math.round((val / max) * 100) : 0;
  return `<div class="mbar-cell"><div class="mbar-track"><div class="mbar-fill" style="width:${pct}%;background:${color}"></div></div><span class="mbar-val">${fmt(val)}</span></div>`;
}
function variacaoHtml_(pct, label){
  if (pct === null) return `<span style="color:${BLUE};font-weight:700">novo</span>`;
  if (label === 'alta') return `<span style="color:${CORAL};font-weight:700">▲ +${fmtPct(pct)}</span>`;
  if (label === 'baixa') return `<span style="color:${GREEN};font-weight:700">▼ ${fmtPct(pct)}</span>`;
  return `<span style="color:${GRAY}">→ estável</span>`;
}
// Paleta categórica de meses — chart-1..5 do iGreen DS (BLUE/TEAL/AMBER/GREEN
// já são tokens DS; #8654CC/#0F74C5 = chart-5/chart-3 convertidos de OKLCH).
const MONTH_COLORS = [BLUE, '#8654CC', AMBER, GREEN, CORAL, '#0F74C5'];

function openTipoModal_(linha){
  document.getElementById('modalTitle2').textContent = linha.tipo + ' — por distribuidora';
  document.getElementById('modalSub2').textContent = 'Abertura de chamados por distribuidora · Últimas 2 sem: ' + DATA.tipoTabela.rangeAtual;
  const monthLabels = DATA.tipoTabela.monthLabels;
  const maxAtual = Math.max(...linha.porDistribuidora.map(d => Math.max(d.atual, d.anterior)), 1);
  const maxMes = Math.max(...linha.porDistribuidora.flatMap(d => d.porMes), 1);
  const body = document.getElementById('modalBody2');
  body.innerHTML = `
    <div class="cgrid" style="margin-bottom:1.2rem">
      <div class="chart-card"><h3>${linha.tipo} — últimas 2 semanas por distribuidora</h3>
        <div class="chart-wrap" style="height:240px"><canvas id="miniDistBar"></canvas></div></div>
      <div class="chart-card"><h3>${linha.tipo} — evolução mensal por distribuidora</h3>
        <div class="chart-wrap" style="height:240px"><canvas id="miniDistLine"></canvas></div></div>
    </div>
    <div class="tbl-wrap"><table>
      <thead><tr><th>Distribuidora</th><th>Últ. 2 sem</th><th>2 sem ant.</th><th>Variação</th>${monthLabels.map(l=>`<th>${l}</th>`).join('')}<th>Total</th><th>Em aberto</th></tr></thead>
      <tbody>${linha.porDistribuidora.map((d,i) => `<tr class="cc" data-dist-i="${i}">
        <td>${d.distribuidora}</td>
        <td>${miniBar_(d.atual, maxAtual, d.atual>=d.anterior*1.5&&d.anterior>0?RED:BLUE)}</td>
        <td>${miniBar_(d.anterior, maxAtual, LGRAY)}</td>
        <td>${variacaoHtml_(d.variacaoPct, d.variacaoLabel)}</td>
        ${d.porMes.map((v,mi)=>`<td>${miniBar_(v, maxMes, MONTH_COLORS[mi%MONTH_COLORS.length])}</td>`).join('')}
        <td><strong>${fmt(d.total)}</strong></td>
        <td>${fmt(d.emAberto)}</td>
      </tr>`).join('')}</tbody>
    </table></div>
  `;
  const top = linha.porDistribuidora.slice(0, 8);
  destroyChart2_('miniDistBar');
  CHARTS_MODAL2['miniDistBar'] = new Chart(document.getElementById('miniDistBar'), {
    type: 'bar',
    data: { labels: top.map(d => d.distribuidora), datasets: [
      { label: 'Últ. 2 sem.', data: top.map(d => d.atual), backgroundColor: BLUE, borderRadius: 4 },
      { label: '2 sem. ant.', data: top.map(d => d.anterior), backgroundColor: LGRAY, borderRadius: 4 }
    ] },
    options: { indexAxis: 'y', responsive: true, maintainAspectRatio: false,
      plugins: { legend: { position: 'top', labels: { boxWidth: 12, font: { size: 10 } } } },
      scales: { x: { grid: { color: gridC } }, y: { grid: { display: false }, ticks: { font: { size: 10 } } } } }
  });
  destroyChart2_('miniDistLine');
  const top6 = linha.porDistribuidora.slice(0, 6);
  CHARTS_MODAL2['miniDistLine'] = new Chart(document.getElementById('miniDistLine'), {
    type: 'line',
    data: { labels: monthLabels, datasets: top6.map((d,i) => ({
      label: d.distribuidora, data: d.porMes, borderColor: MONTH_COLORS[i % MONTH_COLORS.length],
      backgroundColor: MONTH_COLORS[i % MONTH_COLORS.length], tension: .35, pointRadius: 4, fill: false
    })) },
    options: { responsive: true, maintainAspectRatio: false,
      plugins: { legend: { position: 'bottom', labels: { boxWidth: 10, font: { size: 9 } } } },
      scales: { x: { grid: { display: false } }, y: { grid: { color: gridC } } } }
  });
  body.querySelectorAll('[data-dist-i]').forEach(row => {
    row.addEventListener('click', () => {
      const d = linha.porDistribuidora[parseInt(row.dataset.distI)];
      const tix = DATA.allTickets.filter(t => t.tipo === linha.tipo && (t.distribuidora && t.distribuidora !== '-' ? t.distribuidora : 'Sem distribuidora') === d.distribuidora);
      openModal(linha.tipo + ' — ' + d.distribuidora, tix, [['blue', fmt(tix.length) + ' tickets']]);
    });
  });
  document.getElementById('modalOverlay2').classList.add('open');
}

let DATA = null;

async function loadData(){
  try {
    const res = await fetch(API_URL + (API_URL.includes('?') ? '&' : '?') + 'format=json');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    DATA = await res.json();
    boot();
  } catch (err) {
    document.getElementById('root').innerHTML =

/* ---------- TABS / SECTIONS ---------- */
let sections = [];
const rendered = {};

function buildShell(){
  sections = [];
  sections.push({ id: 'diario', label: '📅 Relatório Diário', render: renderRelatorioDiario });
  sections.push({ id: 'geral', label: 'Visão Geral', render: renderGeral });
  if (DATA.fornecedoras.length > 0) sections.push({ id: 'fornecedoras', label: 'Fornecedoras', render: renderFornecedoras });
  if (DATA.distribuidoras && DATA.distribuidoras.length > 0) sections.push({ id: 'distribuidoras', label: 'Distribuidoras', render: renderDistribuidoras });
  DATA.months.forEach(m => sections.push({ id: 'm-' + m.key, label: m.label, render: () => renderMes(m) }));
  sections.push({ id: 'sla', label: 'SLA & Tempos', render: renderSla });
  sections.push({ id: 'picos', label: 'Picos & Semanas', render: renderPicos });
  sections.push({ id: 'reab', label: 'Reaberturas', render: renderReab });

  document.getElementById('tabsBar').innerHTML = sections.map((s,i) =>
    `<div class="tab${i===0?' active':''}" data-id="${s.id}">${s.label}</div>`).join('');
  document.getElementById('sectionsContainer').innerHTML = sections.map((s,i) =>
    `<div class="section${i===0?' active':''}" id="tab-${s.id}"></div>`).join('');

  document.querySelectorAll('.tab').forEach(tabEl => {
    tabEl.addEventListener('click', () => showTab(tabEl.dataset.id));
  });
}

function showTab(id){
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + id).classList.add('active');
  document.querySelector('.tab[data-id="' + id + '"]').classList.add('active');
  if (!rendered[id]) {
    const s = sections.find(s => s.id === id);
    s.render();
    rendered[id] = true;
  }
}

/* ---------- GAUGE (semicírculo SVG) ---------- */
function gaugeSvg(val, label){
  if (val === null || val === undefined) {
    return `<div class="chart-card" style="text-align:center;padding:.9rem"><div class="kpi-label">${label}</div><div style="padding:1.2rem 0;color:${GRAY}">sem dados</div></div>`;
  }
  const maxScale = 30;
  const p = Math.min(val / maxScale, 1);
  const color = val <= 7 ? GREEN : val <= 15 ? AMBER : RED;
  const angle = Math.PI - p * Math.PI;
  const ex = (70 + 60 * Math.cos(angle)).toFixed(1);
  const ey = (70 - 60 * Math.sin(angle)).toFixed(1);
  const largeArc = p > 0.5 ? 1 : 0;
  return `<div class="chart-card" style="text-align:center;padding:.9rem">
    <div class="kpi-label">${label}</div>
    <svg width="140" height="80" viewBox="0 0 140 80">
      <path d="M10,70 A60,60 0 0,1 130,70" fill="none" stroke="${LGRAY}" stroke-width="12" stroke-linecap="round"/>
      <path d="M10,70 A60,60 0 ${largeArc},1 ${ex},${ey}" fill="none" stroke="${color}" stroke-width="12" stroke-linecap="round"/>
    </svg>
    <div style="font-size:1.3rem;font-weight:700;color:${color}">${val.toFixed(1)}d</div>
  </div>`;
}

/* ---------- RELATÓRIO DIÁRIO ---------- */
// Todo o cálculo abaixo é feito no cliente a partir de DATA.allTickets
// (criadoIso / finalizadoIso / statusFornecedora) — não depende de nenhum
// campo novo no cache do Apps Script além do que já vem em buildAggregates_.
// Lazy: em index.html (dashboard estático), DATA só existe depois do fetch,
// então não dá pra montar o Set no topo do script (rodaria antes de DATA existir).
let RD_HOLIDAYS = null;
function rdHolidaySet_(){
  if (!RD_HOLIDAYS) RD_HOLIDAYS = new Set(DATA.holidays || []);
  return RD_HOLIDAYS;
}
const RD_NOTES_KEY = 'igreenRdNotes_v1';
const RD_MONTH_LABELS = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];

function rdParseIso_(iso){ const [y,m,d] = iso.split('-').map(Number); return new Date(y, m-1, d); }
function rdFmtIso_(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function rdIsBizDay_(d){
  const dow = d.getDay();
  if (dow===0||dow===6) return false;
  return !rdHolidaySet_().has(rdFmtIso_(d));
}
// Espelha businessDaysBetween_ do Aggregate.js: exclusivo no início, inclusivo no fim.
function rdBizDaysBetween_(startIso, endIso){
  if (!startIso || !endIso) return 0;
  const start = rdParseIso_(startIso), end = rdParseIso_(endIso);
  if (end <= start) return 0;
  let count = 0;
  const d = new Date(start); d.setDate(d.getDate()+1);
  while (d <= end) { if (rdIsBizDay_(d)) count++; d.setDate(d.getDate()+1); }
  return count;
}
function rdPrevBizDay_(iso){
  const d = rdParseIso_(iso);
  do { d.setDate(d.getDate()-1); } while (!rdIsBizDay_(d));
  return rdFmtIso_(d);
}
function rdPrevMonthPrefix_(iso){
  const d = rdParseIso_(iso);
  d.setDate(1); d.setMonth(d.getMonth()-1);
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
}
function rdMonthLabel_(prefix){
  const [y,m] = prefix.split('-');
  return RD_MONTH_LABELS[parseInt(m,10)-1] + '/' + y;
}
function rdRound1_(n){ return Math.round(n*10)/10; }
function rdRound2_(n){ return Math.round(n*100)/100; }
function rdDu_(n){ return n==null ? '—' : n.toFixed(2).replace('.', ','); }
function rdSlaEmoji_(tmr){
  if (tmr==null) return '⚪';
  if (tmr<=6) return '🟢';
  if (tmr<=10) return '🟡';
  if (tmr<=15) return '🟠';
  return '🔴';
}

function rdLatestDateIso_(){
  let max = null;
  DATA.allTickets.forEach(t=>{
    if (t.criadoIso && (!max || t.criadoIso>max)) max = t.criadoIso;
    if (t.finalizadoIso && (!max || t.finalizadoIso>max)) max = t.finalizadoIso;
  });
  return max || rdFmtIso_(new Date());
}

// TMR = média de dias úteis (Criado → Finalizado); SLA% = % finalizados em ≤3 d.u.
function rdSlaStats_(tix){
  if (!tix.length) return { count: 0, tmr: null, pctNoPrazo: null };
  let soma = 0, noPrazo = 0;
  tix.forEach(t => {
    const du = rdBizDaysBetween_(t.criadoIso, t.finalizadoIso);
    soma += du;
    if (du <= 3) noPrazo++;
  });
  return { count: tix.length, tmr: rdRound2_(soma/tix.length), pctNoPrazo: rdRound1_(noPrazo/tix.length*100) };
}

// Categorias fixas do campo "Status" — confirmadas contra o relatório de
// referência (relatorio Diario 06-07.pdf): Em Andamento/Respondido/Ag.
// Fornecedora do resumo batem exatamente com essas colunas.
const RD_STATUS_PATTERNS = {
  agRespForn: /aguard.*resposta.*fornecedor/i,
  agSetInt:   /aguard.*setor.*interno/i,
  andInt:     /andamento.*interno/i,
  contCli:    /contato.*cliente/i,
  emAnal:     /em an[aá]lise/i,
  envForn:    /enviado.*fornecedor/i,
  resp:       /^respondido$/i,
  pendente:   /pendente/i
};
function rdClassifyStatus_(status){
  const s = (status||'').trim();
  if (RD_STATUS_PATTERNS.agRespForn.test(s)) return 'agRespForn';
  if (RD_STATUS_PATTERNS.agSetInt.test(s)) return 'agSetInt';
  if (RD_STATUS_PATTERNS.andInt.test(s)) return 'andInt';
  if (RD_STATUS_PATTERNS.contCli.test(s)) return 'contCli';
  if (RD_STATUS_PATTERNS.emAnal.test(s)) return 'emAnal';
  if (RD_STATUS_PATTERNS.envForn.test(s)) return 'envForn';
  if (RD_STATUS_PATTERNS.resp.test(s)) return 'resp';
  return null; // resíduo — status que não bate com nenhuma das 7 categorias fixas
}

function rdSnapshot_(dateIso){
  const abertos = DATA.allTickets.filter(t => t.criadoIso === dateIso);
  const finalizados = DATA.allTickets.filter(t => t.finalizadoIso === dateIso);
  const backlogRaw = DATA.allTickets.filter(t => t.criadoIso <= dateIso && (!t.finalizadoIso || t.finalizadoIso > dateIso));

  const backlog = backlogRaw.map(t => {
    const du = rdBizDaysBetween_(t.criadoIso, dateIso);
    const bucket = du<=3?'noPrazo':du<=15?'vencido':du<=30?'critico':'urgente';
    return Object.assign({ _du: du, _bucket: bucket, _statusCat: rdClassifyStatus_(t.status) }, t);
  });

  const buckets = { noPrazo:0, vencido:0, critico:0, urgente:0 };
  backlog.forEach(t => buckets[t._bucket]++);
  const vencidosTotal = buckets.vencido + buckets.critico + buckets.urgente;

  // Resumo Geral — cada campo bate com uma (ou soma de) categoria(s) fixa(s)
  // de Status, validado contra o relatório de referência.
  const pendentes = backlog.filter(t => RD_STATUS_PATTERNS.pendente.test(t.status||'')).length;
  const emAndamento = backlog.filter(t => t._statusCat === 'andInt').length;
  const respondido = backlog.filter(t => t._statusCat === 'resp').length;
  const agFornecedora = backlog.filter(t => t._statusCat === 'envForn' || t._statusCat === 'agRespForn').length;

  const curPrefix = dateIso.slice(0,7);
  let refPrefix = curPrefix;
  let finalizadosMesRef = DATA.allTickets.filter(t => t.finalizadoIso && t.finalizadoIso.slice(0,7)===curPrefix && t.finalizadoIso<=dateIso);
  let isFechamento = false;
  if (finalizadosMesRef.length === 0) {
    refPrefix = rdPrevMonthPrefix_(dateIso);
    finalizadosMesRef = DATA.allTickets.filter(t => t.finalizadoIso && t.finalizadoIso.slice(0,7)===refPrefix);
    isFechamento = true;
  }

  return { dateIso, abertos, finalizados, backlog, buckets, vencidosTotal, agFornecedora,
    pendentes, emAndamento, respondido,
    refPrefix, refLabel: rdMonthLabel_(refPrefix), isFechamento, finalizadosMesRef };
}

function rdForList_(snap){
  const set = new Set();
  snap.backlog.forEach(t => set.add(t.fornecedora || 'Não informado'));
  snap.abertos.forEach(t => set.add(t.fornecedora || 'Não informado'));
  return Array.from(set).sort();
}

function rdSlaPorFornecedora_(snap){
  const forns = rdForList_(snap);
  const rows = forns.map(f => {
    const finDia = snap.finalizados.filter(t => (t.fornecedora||'Não informado')===f);
    const finMes = snap.finalizadosMesRef.filter(t => (t.fornecedora||'Não informado')===f);
    return { fornecedora: f, dia: rdSlaStats_(finDia), mes: rdSlaStats_(finMes) };
  }).sort((a,b) => (a.mes.tmr==null?Infinity:a.mes.tmr) - (b.mes.tmr==null?Infinity:b.mes.tmr));
  return { rows, geralDia: rdSlaStats_(snap.finalizados), geralMes: rdSlaStats_(snap.finalizadosMesRef) };
}

function rdBacklogPorFornecedora_(snap){
  return rdForList_(snap).map(f => {
    const tix = snap.backlog.filter(t => (t.fornecedora||'Não informado')===f);
    const b = { noPrazo:0, vencido:0, critico:0, urgente:0 };
    tix.forEach(t => b[t._bucket]++);
    return Object.assign({ fornecedora: f, total: tix.length }, b);
  }).sort((a,b) => b.total - a.total);
}

const RD_STATUS_COLS = ['agRespForn','agSetInt','andInt','contCli','emAnal','envForn','resp'];
const RD_BUCKET_COLS = ['noPrazo','vencido','critico','urgente'];
// Tabela "Backlog Operacional" — uma linha por fornecedora com as 7 colunas
// fixas de status + as 4 faixas de SLA + total, igual ao relatório de referência.
function rdStatusMatrixPorFornecedora_(snap){
  const forns = rdForList_(snap);
  const rows = forns.map(f => {
    const tix = snap.backlog.filter(t => (t.fornecedora||'Não informado')===f);
    const row = { fornecedora: f, total: tix.length };
    RD_STATUS_COLS.concat(RD_BUCKET_COLS).forEach(k => row[k] = 0);
    tix.forEach(t => {
      if (t._statusCat) row[t._statusCat]++;
      row[t._bucket]++;
    });
    return row;
  }).sort((a,b) => b.total - a.total);

  const totalRow = { fornecedora: 'Total Geral', total: snap.backlog.length };
  RD_STATUS_COLS.concat(RD_BUCKET_COLS).forEach(k => totalRow[k] = rows.reduce((s,r) => s+r[k], 0));
  return { rows, totalRow };
}

function rdTiposPorFornecedora_(snap){
  const map = {};
  snap.abertos.forEach(t => {
    const tipo = t.tipo, f = t.fornecedora || 'Não informado';
    map[tipo] = map[tipo] || { _total: 0 };
    map[tipo][f] = (map[tipo][f]||0) + 1;
    map[tipo]._total++;
  });
  const linhas = Object.keys(map).map(tipo => ({ tipo, total: map[tipo]._total, porForn: map[tipo] }))
    .sort((a,b) => b.total - a.total);
  const forns = rdForList_(snap).filter(f => snap.abertos.some(t => (t.fornecedora||'Não informado')===f));
  return { forns, linhas };
}

function rdTop3Tipos_(snap){
  const map = {};
  snap.abertos.forEach(t => map[t.tipo] = (map[t.tipo]||0) + 1);
  return Object.keys(map).map(t => ({ tipo:t, qtd:map[t] })).sort((a,b) => b.qtd-a.qtd).slice(0,3);
}

function rdDestaques_(snap, slaInfo){
  const out = [];
  const diff = snap.finalizados.length - snap.abertos.length;
  if (diff >= 0) out.push(['🟢', `Dia com saldo positivo — ${fmt(snap.finalizados.length)} finalizados contra ${fmt(snap.abertos.length)} abertos (+${fmt(diff)})`]);
  else out.push(['🔴', `Dia com saldo negativo — ${fmt(snap.finalizados.length)} finalizados contra ${fmt(snap.abertos.length)} abertos (${fmt(diff)})`]);

  const porForn = {};
  snap.finalizados.forEach(t => { const f=t.fornecedora||'Não informado'; porForn[f]=(porForn[f]||0)+1; });
  const lideres = Object.keys(porForn).map(f => ({ f, n: porForn[f] })).sort((a,b) => b.n-a.n);
  if (lideres.length) {
    const [l1,l2,l3] = lideres;
    let txt = `${l1.f} liderou as finalizações do dia com ${fmt(l1.n)} tickets encerrados`;
    if (l2) txt += `, seguida de ${l2.f} (${fmt(l2.n)})`;
    if (l3) txt += ` e ${l3.f} (${fmt(l3.n)})`;
    out.push(['🟡', txt]);
  }

  const candSla = slaInfo.rows.filter(r => r.dia.count>=3 && r.dia.pctNoPrazo!=null).sort((a,b) => b.dia.pctNoPrazo-a.dia.pctNoPrazo);
  if (candSla.length) {
    const best = candSla[0];
    out.push(['🟢', `${best.fornecedora} lidera o SLA de finalização do dia com ${fmtPct(best.dia.pctNoPrazo)} dos tickets entregues dentro do prazo (≤3 d.u.)`]);
  }

  const backlogForn = rdBacklogPorFornecedora_(snap);
  const relevantes = slaInfo.rows.filter(r => {
    const bf = backlogForn.find(b => b.fornecedora===r.fornecedora);
    return bf && bf.total>=20 && r.mes.tmr!=null;
  }).sort((a,b) => b.mes.tmr-a.mes.tmr);
  if (relevantes.length) {
    const worst = relevantes[0];
    const bf = backlogForn.find(b => b.fornecedora===worst.fornecedora);
    out.push(['🔴', `${worst.fornecedora} mantém TMR de ${rdDu_(worst.mes.tmr)}du — principal ofensora do SLA geral — com ${fmt(bf.total)} tickets em backlog, sendo ${fmt(bf.urgente)} acima de 30 d.u.`]);
  }

  const prevIso = rdPrevBizDay_(snap.dateIso);
  const prevBacklog = DATA.allTickets.filter(t => t.criadoIso<=prevIso && (!t.finalizadoIso || t.finalizadoIso>prevIso)).length;
  const curBacklog = snap.backlog.length;
  const bdiff = curBacklog - prevBacklog;
  if (bdiff <= 0) out.push(['🟢', `Backlog geral recua para ${fmt(curBacklog)} — queda de ${fmt(Math.abs(bdiff))} tickets em relação ao dia útil anterior (${fmt(prevBacklog)})`]);
  else out.push(['🔴', `Backlog geral sobe para ${fmt(curBacklog)} — alta de ${fmt(bdiff)} tickets em relação ao dia útil anterior (${fmt(prevBacklog)})`]);

  return out;
}

function rdBuildText_(snap, slaInfo, notes){
  const d = rdParseIso_(snap.dateIso);
  const dataLabel = String(d.getDate()).padStart(2,'0') + '/' + String(d.getMonth()+1).padStart(2,'0');

    .map(r => `${rdSlaEmoji_(r.mes.tmr)} ${r.fornecedora} | SLA: ${rdDu_(r.mes.tmr)}du`).join('\n\n');

  const mesLinha = snap.isFechamento
    ? `⏱️ SLA fechamento ${mesNome}: ${rdDu_(slaInfo.geralMes.tmr)} dias úteis`
    : `⏱️ SLA médio ${mesNome}: ${rdDu_(slaInfo.geralMes.tmr)} dias úteis`;

  return `📊 REPORTE DIÁRIO — ${dataLabel}

Equipe: Relacionamento iVolt

━━━━━━━━━━━━━━━━━━━━━━━━

📂 Abertos: ${fmt(snap.abertos.length)}

✅ Finalizados: ${fmt(snap.finalizados.length)}

⏳ Ag. Fornecedora: ${fmt(snap.agFornecedora)}

🔴 SLA vencido (>3 d.u.): ${fmt(snap.vencidosTotal)}

⏳ Backlog: ${fmt(snap.backlog.length)}

${mesLinha}

${linhasForn}

⚫ GERAL — SLA: ${rdDu_(slaInfo.geralMes.tmr)}du
━━━ TOP 3 TIPOS ━━━

${top3.map(t => `${t.tipo} — ${fmt(t.qtd)}`).join('\n\n')}

${notes.acontecimentos || 'Nenhum incidente registrado no dia.'}

}

// Monta o payload que vai pro Apps Script (generateDailyReportXlsx) — mesmos
// dados já calculados pra tela, só reempacotados em formato de linhas/colunas.
// Estrutura validada contra o relatório de referência (relatorio Diario 06-07.pdf).
function rdBuildExportPayload_(){
  const snap = RD_SNAP, slaInfo = RD_SLA;
  const notes = { acontecimentos: document.getElementById('rdAcontecimentos').value, disparos: document.getElementById('rdDisparos').value };
  const tf = rdTiposPorFornecedora_(snap);
  const matrix = rdStatusMatrixPorFornecedora_(snap);
  const d = rdParseIso_(snap.dateIso);
  const dateLabel = d.toLocaleDateString('pt-BR');
  const diaSemana = d.toLocaleDateString('pt-BR', { weekday: 'long' });
  const mesNome = snap.refLabel.split('/')[0];

  const top14 = tf.linhas.slice(0,14), resto = tf.linhas.slice(14);
  const restoPorForn = tf.forns.map(f => resto.reduce((s,l) => s+(l.porForn[f]||0), 0));

  const total = snap.backlog.length || 1;
  const bucketCards = [
    { label: '≤ 3 d.u.', sub: 'NO PRAZO', count: snap.buckets.noPrazo, pct: rdRound1_(snap.buckets.noPrazo/total*100) },
    { label: '3–15 d.u.', sub: 'VENCIDO', count: snap.buckets.vencido, pct: rdRound1_(snap.buckets.vencido/total*100) },
    { label: '15–30 d.u.', sub: 'CRÍTICO', count: snap.buckets.critico, pct: rdRound1_(snap.buckets.critico/total*100) },
    { label: '> 30 d.u.', sub: 'URGENTE', count: snap.buckets.urgente, pct: rdRound1_(snap.buckets.urgente/total*100) }
  ];

  return {
    dateLabel: dateLabel,
    diaSemana: diaSemana,
    mesNome: mesNome,
    isFechamento: snap.isFechamento,
    resumo: {
      backlogTotal: snap.backlog.length,
      pendentes: snap.pendentes,
      emAndamento: snap.emAndamento,
      respondido: snap.respondido,
      agFornecedora: snap.agFornecedora,
      abertos: snap.abertos.length,
      finalizados: snap.finalizados.length,
      slaMesPct: slaInfo.geralMes.pctNoPrazo,
      tmrMes: slaInfo.geralMes.tmr
    },
    tiposPorFornecedora: {
      forns: tf.forns,
      linhas: top14.map(l => ({ tipo: l.tipo, total: l.total, porForn: tf.forns.map(f => l.porForn[f] || 0) })),
      demais: resto.length ? { qtdTipos: resto.length, total: resto.reduce((s,l)=>s+l.total,0), porForn: restoPorForn } : null,
      totalGeral: { total: snap.abertos.length, porForn: tf.forns.map(f => snap.abertos.filter(t=>(t.fornecedora||'Não informado')===f).length) }
    },
    bucketCards: bucketCards,
    vencidosTotal: snap.vencidosTotal,
    matrix: {
      forns: matrix.rows.map(r => r.fornecedora),
      rows: matrix.rows.map(r => RD_STATUS_COLS.concat(RD_BUCKET_COLS).map(k => r[k]).concat([r.total])),
      totalRow: RD_STATUS_COLS.concat(RD_BUCKET_COLS).map(k => matrix.totalRow[k]).concat([matrix.totalRow.total])
    },
    slaPorFornecedora: {
      rows: slaInfo.rows.map(r => ({ fornecedora: r.fornecedora, diaPct: r.dia.pctNoPrazo, diaTmr: r.dia.tmr, mesPct: r.mes.pctNoPrazo, mesTmr: r.mes.tmr, diaCount: r.dia.count })),
      geral: { diaPct: slaInfo.geralDia.pctNoPrazo, diaTmr: slaInfo.geralDia.tmr, mesPct: slaInfo.geralMes.pctNoPrazo, mesTmr: slaInfo.geralMes.tmr, diaCount: slaInfo.geralDia.count }
    },
    textoWhatsApp: rdBuildText_(snap, slaInfo, notes)
  };
}

function rdDownloadBase64Xlsx_(base64, fileName){
  const byteChars = atob(base64);
  const byteNumbers = new Array(byteChars.length);
  for (let i = 0; i < byteChars.length; i++) byteNumbers[i] = byteChars.charCodeAt(i);
  const blob = new Blob([new Uint8Array(byteNumbers)], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = fileName;
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 4000);
}

async function rdExportXlsx_(){
  const btn = document.getElementById('rdExportBtn');
  const status = document.getElementById('rdExportStatus');
  btn.disabled = true;
  status.textContent = 'Gerando arquivo — pode levar alguns segundos…';
  const payload = rdBuildExportPayload_();
  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ action: 'exportDailyReport', payload: payload })
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const result = await res.json();
    if (result.error) throw new Error(result.error);
    status.textContent = '✓ Arquivo gerado.';
    rdDownloadBase64Xlsx_(result.base64, result.fileName);
    setTimeout(() => { status.textContent = ''; }, 3000);
  } catch (err) {
    status.textContent = 'Erro: ' + err.message;
  } finally {
    btn.disabled = false;
  }
}

    </tbody>`;

  document.getElementById('rdSlaDesc').textContent = snap.isFechamento
    ? `SLA Dia = finalizados em ${d.toLocaleDateString('pt-BR')} (${fmt(snap.finalizados.length)} tickets). SLA Mês = fechamento de ${snap.refLabel} (${fmt(snap.finalizadosMesRef.length)} tickets).`
    : `SLA Dia = finalizados em ${d.toLocaleDateString('pt-BR')} (${fmt(snap.finalizados.length)} tickets). SLA Mês = acumulado de ${snap.refLabel} até a data (${fmt(snap.finalizadosMesRef.length)} tickets).`;
  document.getElementById('rdSlaTable').innerHTML = `<thead><tr><th>Fornecedora</th><th>SLA% dia</th><th>TMR dia</th><th>SLA% mês</th><th>TMR mês</th><th>Fin. dia</th></tr></thead>
    <tbody>
      ${slaInfo.rows.map(r => `<tr>
        <td>${r.fornecedora}</td>
        <td>${r.dia.pctNoPrazo!=null?fmtPct(r.dia.pctNoPrazo):'—'}</td>
        <td>${r.dia.tmr!=null?rdDu_(r.dia.tmr)+'du':'—'}</td>
        <td>${r.mes.pctNoPrazo!=null?fmtPct(r.mes.pctNoPrazo):'—'}</td>
        <td>${r.mes.tmr!=null?rdDu_(r.mes.tmr)+'du':'—'}</td>
        <td>${fmt(r.dia.count)}</td>
      </tr>`).join('')}
      <tr style="font-weight:700;background:var(--bg)">
        <td>GERAL</td>
        <td>${slaInfo.geralDia.pctNoPrazo!=null?fmtPct(slaInfo.geralDia.pctNoPrazo):'—'}</td>
        <td>${slaInfo.geralDia.tmr!=null?rdDu_(slaInfo.geralDia.tmr)+'du':'—'}</td>
        <td>${slaInfo.geralMes.pctNoPrazo!=null?fmtPct(slaInfo.geralMes.pctNoPrazo):'—'}</td>
        <td>${slaInfo.geralMes.tmr!=null?rdDu_(slaInfo.geralMes.tmr)+'du':'—'}</td>
        <td>${fmt(slaInfo.geralDia.count)}</td>
      </tr>
    </tbody>`;

  const total = snap.backlog.length || 1;
  const bucketDefs = [
    ['noPrazo','≤ 3 d.u.','NO PRAZO', GREEN],
    ['vencido','3–15 d.u.','VENCIDO', AMBER],
    ['critico','15–30 d.u.','CRÍTICO', CORAL],
    ['urgente','> 30 d.u.','URGENTE', RED]
  ];
  document.getElementById('rdBucketCards').innerHTML = bucketDefs.map(([key,range,label,color]) => `
    <div class="wk-card" style="border-color:${color}">
      <div class="wk-val" style="color:${color}">${fmt(snap.buckets[key])}</div>
      <div class="wk-label">${range}</div>
      <div class="wk-range">${label} · ${fmtPct(snap.buckets[key]/total*100)}</div>
    </div>`).join('') +
    `<div class="wk-card" style="border-color:${CORAL};border-width:2px">
      <div class="wk-val" style="color:${CORAL}">${fmt(snap.vencidosTotal)}</div>
      <div class="wk-label">VENCIDOS &gt; 3 d.u.</div>
    </div>`;

  const matrix = rdStatusMatrixPorFornecedora_(snap);
  const statusHeaders = ['Ag.Resp Forn','Ag.Set Int','And. Int','Cont. Cli','Em Anál.','Env. p/Forn','Resp.'];
  const bucketHeaders = ['No prazo','Vencido','Crítico','Urgente'];
  const matrixCellsHtml_ = r => `<td>${r.fornecedora}</td>` +
    RD_STATUS_COLS.map(k => `<td>${r[k]?fmt(r[k]):'—'}</td>`).join('') +
    RD_BUCKET_COLS.map(k => `<td>${r[k]?fmt(r[k]):'—'}</td>`).join('') +
    `<td><strong>${fmt(r.total)}</strong></td>`;
  document.getElementById('rdBacklogTable').innerHTML =
    `<thead><tr><th>Fornecedora</th>${statusHeaders.map(h=>`<th>${h}</th>`).join('')}${bucketHeaders.map(h=>`<th>${h}</th>`).join('')}<th>Total</th></tr></thead>
    <tbody>
      ${matrix.rows.map(r => `<tr>${matrixCellsHtml_(r)}</tr>`).join('')}
      <tr style="font-weight:700;background:var(--bg)">${matrixCellsHtml_(matrix.totalRow)}</tr>
    </tbody>`;

  const destaques = rdDestaques_(snap, slaInfo);
  document.getElementById('rdDestaquesBox').innerHTML = destaques.map(([e,t]) =>
    `<div class="alert ${e==='🔴'?'alert-amber':'alert-blue'}" style="margin-bottom:.6rem">${e} ${t}</div>`).join('');

  const notes = rdLoadNotes_(dateIso);
  document.getElementById('rdAcontecimentos').value = notes.acontecimentos;
  document.getElementById('rdDisparos').value = notes.disparos;
  document.getElementById('rdOutputText').value = rdBuildText_(snap, slaInfo, notes);
}

// Reaproveita o mesmo receiveImportedFile() já usado pelo menu
// "iGreen Tickets → Importar planilha" do Sheets (Código.js) — mesmo parser,
// mesmo dedupe por Código — só muda de onde é chamado.
function rdImportWidgetHtml_(){
  return `
    <div class="chart-card" style="margin-bottom:1.4rem">
      <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px">
        <div>
          <h3 style="margin-bottom:2px">📥 Importar planilha do dia</h3>
          <p style="font-size:12.5px;color:#888;margin:0">Suba o .xlsx exportado do sistema (aba CONSOLIDADOS) — tickets já importados (mesmo Código) são atualizados se algo mudou (ex.: foi finalizado) ou ignorados se nada mudou. Nunca duplica.</p>
        </div>
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
          <input type="file" id="rdFileInput" accept=".xlsx" style="font-size:12px">
          <button class="btn btn-primary" id="rdImportBtn">Importar</button>
        </div>
      </div>
      <div id="rdImportStatus" style="margin-top:10px;font-size:12.5px"></div>
    </div>`;
}
function rdWireImportWidget_(){
  document.getElementById('rdImportBtn').addEventListener('click', () => {
    const input = document.getElementById('rdFileInput');
    const status = document.getElementById('rdImportStatus');
    const btn = document.getElementById('rdImportBtn');
    if (!input.files || !input.files.length) {
      status.innerHTML = `<span style="color:${RED}">Selecione um arquivo .xlsx primeiro.</span>`;
      return;
    }
    const file = input.files[0];
    btn.disabled = true;
    status.innerHTML = `<span style="color:${BLUE}">Enviando e processando — pode levar até 1 minuto para planilhas grandes…</span>`;
    const reader = new FileReader();
    reader.onload = async e => {
      const base64 = e.target.result.split(',')[1];
      try {
        const res = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' }, // evita preflight de CORS
          body: JSON.stringify({ fileBase64: base64, fileName: file.name })
        });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const result = await res.json();
        if (result.error) throw new Error(result.error);
        if (result.warning) {
          btn.disabled = false;
          status.innerHTML = `<span style="color:${RED}">${result.warning}</span>`;
          return;
        }
        status.innerHTML = `<span style="color:${GREEN}">Importação concluída ✓ ${fmt(result.imported)} novos, ${fmt(result.updated||0)} atualizados, ${fmt(result.skipped)} sem alteração (total: ${fmt(result.total)}). Atualizando o relatório…</span>`;
        setTimeout(() => location.reload(), 1200);
      } catch (err) {
        btn.disabled = false;
        status.innerHTML = `<span style="color:${RED}">Erro: ${err.message}</span>`;
      }
    };
    reader.readAsDataURL(file);
  });
}

      <span id="rdExportStatus" style="font-size:12.5px;color:var(--gray)"></span>
    </div>
  `;

  rdWireImportWidget_();
  document.getElementById('rdDatePicker').value = RD_CURRENT_DATE;

  document.getElementById('rdAcontecimentos').addEventListener('input', rdRebuildTextOnly_);
  document.getElementById('rdDisparos').addEventListener('input', rdRebuildTextOnly_);
  document.getElementById('rdCopyBtn').addEventListener('click', () => {
    const ta = document.getElementById('rdOutputText');
    ta.select();
    if (navigator.clipboard && navigator.clipboard.writeText) navigator.clipboard.writeText(ta.value).catch(() => document.execCommand('copy'));
    else document.execCommand('copy');
    const btn = document.getElementById('rdCopyBtn');
    const old = btn.textContent; btn.textContent = '✅ Copiado!';
    setTimeout(() => btn.textContent = old, 1500);
